<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>

    function showSkills() {

      let result = "";

      let name = document.getElementById("username").value;
      result += "Name: " + name + " ";

      let gender = document.getElementsByName("gender");
      for (let i = 0; i < gender.length; i++) {
        if (gender[i].checked) {
          result += "Gender: " + gender[i].value + " ";
        }
      }

      let skills = document.getElementsByName("skills");
      let labels = document.getElementsByName("lblskill");

      let skillList = "";
      for (let i = 0; i < skills.length; i++) {
        if (skills[i].checked) {
          skillList += labels[i].innerHTML + " ";
        }
      }
      result += "Skills: " + skillList;

      let dob = document.getElementById("dob").value;
      result += "DOB: " + dob + " ";

      let age = document.getElementById("age").value;
      result += "Age: " + age + " ";

      let email = document.getElementById("email").value;
      result += "Email: " + email + " ";

      alert(result);
    }
  </script>
</head>

<body>
  <h1>Employee Registration Form</h1>
  <form onsubmit="showSkills(); return false;">
    <table>
      <tr>
        <td>
          <label>Enter Your Name</label>
        </td>
        <td>
          <input type="text" name="username" id="username" />
        </td>
      </tr>
      <tr>
        <td>
          <label>Select Gender</label>
        </td>
        <td>
          <input type="radio" name="gender" id="male" value="M" />
          <label for="male">Male</label>
          <input type="radio" name="gender" id="female" value="F" />
          <label for="female">Female</label>
        </td>
      </tr>
      <tr>
        <td>
          <label>Select skills</label>
        </td>
        <td>
          <input type="checkbox" name="skills" id="as" value="1" />
          <label name="lblskill" for="as">asp</label>
          <input type="checkbox" name="skills" id="cs" value="2" />
          <label name="lblskill" for="cs">c#</label>
          <input type="checkbox" name="skills" id="sql" value="3" />
          <label name="lblskill" for="sql">SQL</label>
          <input type="checkbox" name="skills" id="cpp" value="4" />
          <label name="lblskill" for="cpp">cpp</label>
        </td>
      </tr>

      <tr>
        <td>
          <label>Enter Your DOB</label>
        </td>
        <td>
          <input type="date" name="dob" id="dob" min="2000-01-01" max="2010-12-31" />
        </td>
      </tr>
      <tr>
        <td>
          <label>Enter Your Age</label>
        </td>
        <td>
          <input type="number" name="age" id="age" min="18" max="50" />
        </td>
      </tr>
      <tr>
        <td>
          <label>Enter Your Email</label>
        </td>
        <td>
          <input type="email" name="email" id="email" />
        </td>
      </tr>

      <tr>
        <td>
          <input type="submit" />
          <input type="reset" />
        </td>
        <td>

        </td>
      </tr>
    </table>
  </form>
</body>

</html>
